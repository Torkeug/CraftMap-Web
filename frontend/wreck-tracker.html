<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wreck Tracker</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div id="app" class="wreck-tracker-app">
      <div id="wreck-tracker-body">
        <div id="wreck-tracker-planet-row">
          <div id="wreck-tracker-planet"></div>
          <button
            class="icon-btn"
            id="pin-btn"
            title="Keep visible when the main window hides"
          >
            &#128204;
          </button>
        </div>
        <div id="heading-strip">
          <div id="heading-strip-ticks"></div>
          <div id="heading-strip-center"></div>
          <div id="heading-strip-markers"></div>
        </div>
        <div id="wreck-tracker-footer-row">
          <div id="wreck-tracker-status">Not running.</div>
          <div id="wreck-tracker-legend" title="Bigger dot = closer · number = distance">
            <span class="wreck-tracker-legend-item"
              ><span class="wreck-tracker-dot hull"></span>Wreck</span
            >
            <span class="wreck-tracker-legend-item"
              ><span class="wreck-tracker-dot crate"></span>Crate</span
            >
            <span class="wreck-tracker-legend-item"
              ><span class="wreck-tracker-dot blackbox"></span>Black Box (on foot)</span
            >
          </div>
        </div>
      </div>
      <div id="error-banner"></div>
      <div id="resize-grip">&#9698;</div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/drag-resize.js"></script>
    <script src="js/wreck-tracker-panel.js"></script>
    <script>
      // No dragbar (removed per user request - this window has no
      // titlebar, the pin button just sits inline on the planet-name
      // row) - the whole window is draggable instead, which
      // DragResize.attach already supports safely: its dragbarEl
      // pointerdown handler already ignores clicks on .icon-btn elements
      // (see that module's own comment), so passing #app itself here
      // doesn't break clicking the pin button regardless of where it
      // sits in the layout. Closing is no longer a manual action on this
      // window at all - see js/wrecks.js's toggleTracking, which hides
      // this window as part of "Stop Live Tracking" instead.
      DragResize.attach({
        dragbarEl: document.getElementById("app"),
        gripEl: document.getElementById("resize-grip"),
        getGeometry: () => CraftMapApi.call("get_wreck_tracker_window_geometry"),
        moveWindow: (x, y) => CraftMapApi.call("move_wreck_tracker_window", x, y),
        resizeWindow: (x, y, w, h) => CraftMapApi.call("resize_wreck_tracker_window", x, y, w, h),
        saveGeometry: (x, y, w, h) => CraftMapApi.call("save_wreck_tracker_window_geometry", x, y, w, h),
        minW: 260,
        minH: 50,
        // Tiny, fixed, non-scrolling 3-row layout (planet+pin row, the
        // strip, status+legend row) - no space-filling flex:1 panes that
        // could genuinely need slack the way the main window's forms do,
        // so this only needs enough margin to absorb sub-pixel rounding,
        // not a whole row's worth. The shared 100px default (tuned for
        // those multi-row forms) was nearly doubling this window's real
        // minimum height even at an earlier, more generous 12px setting.
        // See drag-resize.js's own comment on DEFAULT_HEIGHT_MARGIN.
        heightMargin: 4,
      });
    </script>
  </body>
</html>
