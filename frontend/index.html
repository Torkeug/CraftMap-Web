<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CraftMap Resources</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div id="app" class="resources-app">
      <div id="dragbar">
        <span class="grip">&#8942;&#8942;</span>
        <span class="title" id="title-text">CraftMap Resources</span>
        <button class="icon-btn" id="settings-btn" title="Settings">&#9881;</button>
        <button class="icon-btn close-btn" id="close-btn" title="Close">&#10005;</button>
      </div>
      <div id="tab-row">
        <button class="tab-btn" id="tab-resource" data-mode="resource">Resource</button>
        <button class="tab-btn" id="tab-location" data-mode="location">Location</button>
        <button class="tab-btn" id="tab-recipe" data-mode="recipe">Recipe</button>
        <button class="tab-btn" id="tab-sources" data-mode="sources">Sources</button>
        <button class="tab-btn" id="tab-queue" title="Show/hide the Craft Queue window">Queue</button>
      </div>
      <div id="body">
        <div id="deposits-view">
          <div id="search-row">
            <input
              id="search-input"
              type="text"
              placeholder="Search resource / sector / system / planet / notes..."
            />
          </div>
          <div id="type-filter"></div>
          <div id="deposit-tree"></div>
          <div id="deposit-form">
            <div class="form-grid">
              <div class="form-field">
                <label>Type</label>
                <input id="f-type" type="text" />
              </div>
              <div class="form-field">
                <label>Resource</label>
                <input id="f-resource" type="text" />
              </div>
              <div class="form-field">
                <label>Sector</label>
                <input id="f-sector" type="text" />
              </div>
              <div class="form-field">
                <label>System</label>
                <input id="f-system" type="text" />
              </div>
              <div class="form-field">
                <label>Planet</label>
                <input id="f-planet" type="text" />
              </div>
              <div class="form-field">
                <label>Status</label>
                <select id="f-status">
                  <option>Free</option>
                  <option>Claimed</option>
                  <option>Depleted</option>
                  <option>Unknown</option>
                </select>
              </div>
            </div>
            <div class="form-field form-field-full">
              <label>Notes</label>
              <input id="f-notes" type="text" />
            </div>
            <div class="form-buttons">
              <button class="btn btn-success" id="btn-add">Add</button>
              <button class="btn btn-accent" id="btn-update">Update</button>
              <button class="btn btn-neutral" id="btn-clear">Clear</button>
              <button class="btn btn-danger" id="btn-delete">Delete</button>
            </div>
          </div>
        </div>

        <div id="recipe-view">
          <div id="recipe-selector-row">
            <div id="recipe-sel-left">
              <label>Recipe:</label>
              <div id="recipe-combo-wrap" class="dropdown-anchor">
                <input id="recipe-combo" type="text" placeholder="Select a recipe or raw resource..." />
              </div>
              <span class="qty-sep">&times;</span>
              <input id="recipe-qty" type="text" value="1" />
              <button
                class="btn btn-neutral btn-small"
                id="recipe-add-queue-btn"
                title="Add this recipe to the Craft Queue"
              >
                + Queue
              </button>
            </div>
            <div id="recipe-mode-tabs">
              <button class="tab-btn mode-btn" id="mode-breakdown" data-mode="breakdown">
                Breakdown
              </button>
              <button class="tab-btn mode-btn" id="mode-totals" data-mode="totals">
                Totals
              </button>
              <button class="tab-btn mode-btn" id="mode-usedin" data-mode="usedin">
                Used In
              </button>
            </div>
          </div>

          <div id="recipe-breakdown-tree"></div>

          <div id="recipe-edit-form">
            <div class="form-row">
              <label>Name:</label>
              <input id="recipe-name" type="text" readonly />
            </div>

            <div class="recipe-subsection-label">Stations:</div>
            <div id="recipe-stations">
              <div class="station-row station-header">
                <span></span>
                <span class="col-hint">Auto (s)</span>
                <span class="col-hint">Manual (s)</span>
              </div>
              <div id="recipe-station-rows"></div>
            </div>

            <div class="recipe-subsection-label">Outputs:</div>
            <div id="recipe-output-rows"></div>

            <div class="recipe-subsection-label">Ingredients:</div>
            <div id="recipe-ingredient-rows" class="scroll-rows"></div>
          </div>
        </div>

        <div id="sources-view">
          <div id="sources-selector-row">
            <label>Resource:</label>
            <div id="sources-combo-wrap" class="dropdown-anchor">
              <input
                id="sources-combo"
                type="text"
                placeholder="Select a raw resource..."
              />
            </div>
          </div>
          <div class="recipe-subsection-label">Source nodes:</div>
          <div class="source-row source-row-header">
            <span></span>
            <span class="col-hint">Concentration</span>
          </div>
          <div id="sources-rows" class="scroll-rows"></div>
        </div>
      </div>
      <div id="error-banner"></div>
      <div id="resize-grip">&#9698;</div>
    </div>
    <div id="step-popup" class="step-popup hidden"></div>
    <div id="settings-dialog" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <span>Hotkey Settings</span>
          <button class="icon-btn close-btn" id="settings-close-btn" title="Close">
            &#10005;
          </button>
        </div>
        <div class="modal-body">
          <label class="modal-field-label">Hide/show key</label>
          <div id="hotkey-display">F1</div>
          <div id="hotkey-error"></div>
          <div class="modal-buttons">
            <button class="btn btn-neutral" id="hotkey-rebind-btn">Rebind</button>
            <button class="btn btn-neutral" id="hotkey-close-btn">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/drag-resize.js"></script>
    <script src="js/dropdown.js"></script>
    <script src="js/deposits.js"></script>
    <script src="js/breakdown-tree.js"></script>
    <script src="js/recipe-panel.js"></script>
    <script src="js/sources.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/settings.js"></script>
    <script>
      document.getElementById("close-btn").addEventListener("click", () => {
        CraftMapApi.call("quit_app");
      });

      DragResize.attach({
        dragbarEl: document.getElementById("dragbar"),
        gripEl: document.getElementById("resize-grip"),
        getGeometry: () => CraftMapApi.call("get_window_geometry"),
        moveWindow: (x, y) => CraftMapApi.call("move_window", x, y),
        resizeWindow: (x, y, w, h) => CraftMapApi.call("resize_window", x, y, w, h),
        saveGeometry: (x, y, w, h) => CraftMapApi.call("save_window_geometry", x, y, w, h),
        // Just an absolute floor beneath drag-resize.js's own dynamic
        // measureMinSize (which measures the actual rendered height at a
        // fixed 624px width - see theme.css's #app.measuring-min-size) -
        // not itself the real guard, but kept matching that 624 so this
        // number stays in sync if that width ever changes.
        minW: 624,
        minH: 240,
      });
    </script>
  </body>
</html>
