<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Craft Queue</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div id="app">
      <div id="dragbar">
        <span class="grip">&#8942;&#8942;</span>
        <span class="title" id="title-text">&#10687;&nbsp;&nbsp;Craft Queue</span>
        <button class="icon-btn" id="pin-btn" title="Keep visible when the main window hides">&#128204;</button>
        <button class="icon-btn close-btn" id="close-btn" title="Close">&#10005;</button>
      </div>
      <div id="tab-row">
        <button class="tab-btn active" id="queue-mode-queue" data-mode="queue">Queue</button>
        <button class="tab-btn" id="queue-mode-totals" data-mode="totals">Totals</button>
      </div>
      <div id="queue-body">
        <div id="queue-job-list"></div>
        <div id="queue-split"></div>
        <div id="queue-breakdown-tree"></div>
      </div>
      <div id="queue-add-row">
        <div class="dropdown-anchor" id="queue-add-recipe-wrap">
          <input id="queue-add-recipe" type="text" placeholder="Add a recipe..." />
        </div>
        <input id="queue-add-qty" type="text" value="1" />
        <button class="btn btn-success btn-small" id="queue-add-btn">+ Add</button>
        <button class="btn btn-neutral btn-small" id="queue-clear-done-btn">Clear done</button>
      </div>
      <div id="error-banner"></div>
      <div id="resize-grip">&#9698;</div>
    </div>
    <div id="step-popup" class="step-popup hidden"></div>
    <script src="js/api.js"></script>
    <script src="js/drag-resize.js"></script>
    <script src="js/dropdown.js"></script>
    <script src="js/breakdown-tree.js"></script>
    <script src="js/queue-panel.js"></script>
    <script>
      document.getElementById("close-btn").addEventListener("click", () => {
        CraftMapApi.call("hide_queue_window");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        // See index.html's identical guard - a dropdown suggestion list or
        // the step popup already handles its own Escape and doesn't stop
        // propagation, so this document-level listener would otherwise
        // also dismiss the whole window on the same keypress.
        if (document.querySelector(".dropdown-list.show")) return;
        if (!document.getElementById("step-popup").classList.contains("hidden")) return;
        CraftMapApi.call("dismiss_queue_window");
      });

      DragResize.attach({
        dragbarEl: document.getElementById("dragbar"),
        gripEl: document.getElementById("resize-grip"),
        getGeometry: () => CraftMapApi.call("get_queue_window_geometry"),
        moveWindow: (x, y) => CraftMapApi.call("move_queue_window", x, y),
        resizeWindow: (x, y, w, h) => CraftMapApi.call("resize_queue_window", x, y, w, h),
        saveGeometry: (x, y, w, h) => CraftMapApi.call("save_queue_window_geometry", x, y, w, h),
        minW: 320,
        minH: 380,
      });
    </script>
  </body>
</html>
